# Nginx 服务器 SEO 优化配置
# 在 /etc/nginx/sites-available/funocracy 中使用

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name funocracy.com www.funocracy.com;
    
    # SSL 证书配置
    ssl_certificate /etc/ssl/certs/funocracy.com.crt;
    ssl_certificate_key /etc/ssl/private/funocracy.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # 安全 Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # 内容安全策略
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self';" always;
    
    # 网站根目录
    root /var/www/funocracy;
    
    # 默认文件
    index index.html index.htm;
    
    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/html text/plain text/xml text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_comp_level 6;
    
    # ===== 字符编码 =====
    charset UTF-8;
    
    # ===== 浏览器缓存配置 =====
    # HTML 文件 - 1 小时缓存
    location ~* ^/.*\.html?$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Etag "\"$(stat -f %i $request_filename)\"" always;
    }
    
    # CSS/JavaScript - 1 年缓存
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 图片 - 1 年缓存
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 字体 - 1 年缓存
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # 其他文件 - 2 天缓存
    location ~* \.(xml|json)$ {
        expires 2d;
        add_header Cache-Control "public";
    }
    
    # ===== 禁止访问敏感文件 =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ (\.php|\.phtml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ===== 菜单路由 - 可选 =====
    # 如果使用 SPA 或需要特定的路由规则
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # ===== 403 和 404 错误处理 =====
    error_page 403 /index.html;
    error_page 404 /index.html;
    
    # ===== 日志 =====
    access_log /var/log/nginx/funocracy_access.log combined buffer=32k;
    error_log /var/log/nginx/funocracy_error.log warn;
    
    # ===== 禁用服务器签名 =====
    server_tokens off;
}

# ===== HTTP 到 HTTPS 重定向 =====
server {
    listen 80;
    listen [::]:80;
    server_name funocracy.com www.funocracy.com;
    return 301 https://$server_name$request_uri;
}

# ===== 非 www 到 www 重定向 =====
server {
    listen 443 ssl http2;
    server_name funocracy.com;
    
    ssl_certificate /etc/ssl/certs/funocracy.com.crt;
    ssl_certificate_key /etc/ssl/private/funocracy.com.key;
    
    return 301 https://www.funocracy.com$request_uri;
}

